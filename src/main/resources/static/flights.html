<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wandria Flights</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>Available Flights</h1>

<div style="margin-bottom: 20px;">
    <input type="text" id="destInput" placeholder="Enter destination (e.g. Dubai)">
    <button onclick="searchByDestination()">Search Destination</button>

    <select id="categoryInput" style="margin-left: 20px;">
        <option value="Domestic">Domestic</option>
        <option value="International">International</option>
    </select>
    <button onclick="searchByCategory()">Search Category</button>
    <button onclick="loadAllFlights()" style="margin-left: 20px;">Show All</button>
    <button onclick="showAddForm()" style="margin-left: 20px; background-color: #4CAF50; color: white;">+ Add Flight</button>
</div>

<div>
    <a href="/index.html"><button>Home</button></a>
</div>

<p id="message" style="color: green; font-weight: bold;"></p>

<div id="flightForm" style="display:none; border: 1px solid #ccc; padding: 20px; margin: 20px 0; background: #f9f9f9;">
    <h2 id="formTitle">Add New Flight</h2>
    <input type="hidden" id="editingFlightNumber">

    <div style="margin-bottom: 10px;">
        <label>Flight Number: </label>
        <input type="text" id="fFlightNumber" placeholder="e.g. EK999">
    </div>
    <div style="margin-bottom: 10px;">
        <label>Destination: </label>
        <input type="text" id="fDestination" placeholder="e.g. Tokyo">
    </div>
    <div style="margin-bottom: 10px;">
        <label>Category: </label>
        <select id="fCategory">
            <option value="Domestic">Domestic</option>
            <option value="International">International</option>
        </select>
    </div>
    <div style="margin-bottom: 10px;">
        <label>Departure Date & Time: </label>
        <input type="datetime-local" id="fDepartureTime">
    </div>
    <div style="margin-bottom: 10px;">
        <label>Seats Available: </label>
        <input type="number" id="fSeats" min="0">
    </div>
    <div style="margin-bottom: 10px;">
        <label>Price ($): </label>
        <input type="number" id="fPrice" min="0" step="0.01">
    </div>

    <button onclick="submitFlightForm()" style="background-color: #4CAF50; color: white;">Save</button>
    <button onclick="cancelForm()" style="margin-left: 10px;">Cancel</button>
</div>

<table>
    <thead>
    <tr>
        <th>Flight Number</th>
        <th>Destination</th>
        <th>Category</th>
        <th>Date</th>
        <th>Seats</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="flightsTableBody"></tbody>
</table>

<script src="/js/flights.js"></script>
</body>
</html>
