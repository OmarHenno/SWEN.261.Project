<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wandria Flights</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <a href="/index.html"><button>Home</button></a>
    <a href="/flights.html"><button>Flights</button></a>
    <a href="/cart.html"><button>Cart</button></a>
    <a href="/booking.html"><button>Bookings</button></a>
    <a href="/login.html"><button>Login</button></a>
</div>

<div class="page-container">
    <h1>Available Flights</h1>

    <div class="search-bar">
        <input type="text" id="destInput" placeholder="Enter destination (e.g. Dubai)">
        <button onclick="searchByDestination()">Search Destination</button>

        <select id="categoryInput">
            <option value="">Select Category</option>
            <option value="Domestic">Domestic</option>
            <option value="International">International</option>
        </select>

        <button onclick="searchByCategory()">Search Category</button>
        <button onclick="loadAllFlights()">Show All</button>
        <button id="addFlightButton" onclick="showAddForm()">+ Add Flight</button>
    </div>

    <p id="message"></p>

    <div id="flightForm" class="form-box" style="display:none; max-width: 600px;">
        <h2 id="formTitle">Add New Flight</h2>
        <input type="hidden" id="editingFlightNumber">

        <label>Flight Number</label>
        <input type="text" id="fFlightNumber" placeholder="e.g. EK999">

        <label>Destination</label>
        <input type="text" id="fDestination" placeholder="e.g. Tokyo">

        <label>Category</label>
        <select id="fCategory">
            <option value="Domestic">Domestic</option>
            <option value="International">International</option>
        </select>

        <label>Departure Date & Time</label>
        <input type="datetime-local" id="fDepartureTime">

        <label>Seats Available</label>
        <input type="number" id="fSeats" min="0">

        <label>Price ($)</label>
        <input type="number" id="fPrice" min="0" step="0.01">

        <div class="top-actions" style="margin-top: 18px;">
            <button onclick="submitFlightForm()">Save</button>
            <button onclick="cancelForm()">Cancel</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Flight Number</th>
            <th>Destination</th>
            <th>Category</th>
            <th>Date</th>
            <th>Seats</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="flightsTableBody"></tbody>
    </table>
</div>

<script src="/js/flights.js"></script>

</body>
</html>
